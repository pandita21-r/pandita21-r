
name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: pandita21-r
          outputs: |      
            dist/github-contribution-grid-snake.svg?color_snake=FF69B4&color_head=FF69B4&color_snake_outline=FF1493&color_dots=EBEDF0,9BE9A8,40C463,30A14E,216E39
            dist/github-contribution-grid-snake-dark.svg?color_snake=FF69B4&color_head=FF69B4&color_snake_outline=FF1493&color_dots=161B22,0E4429,006D32,26A641,39D353


      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
